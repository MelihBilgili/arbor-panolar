<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Arbor — Panolar</title>
<style>
  :root{color-scheme:light}
  *{box-sizing:border-box}
  body{margin:0;font-family:'Segoe UI',system-ui,sans-serif;background:#f7f8fa;color:#1c2430;font-size:13px}
  header{background:#16324f;color:#fff;padding:0}
  .topbar{display:flex;align-items:center;gap:14px;padding:8px 14px}
  .topbar h1{font-size:16px;margin:0;font-weight:700;letter-spacing:.5px}
  .tabs{display:flex;gap:4px;padding:0 10px;flex-wrap:wrap}
  .tabs button{background:transparent;color:#cfe0f0;border:0;padding:9px 16px;font-size:13px;font-weight:600;cursor:pointer;border-bottom:3px solid transparent}
  .tabs button.active{color:#fff;border-bottom-color:#fff;background:rgba(255,255,255,.08)}
  .spacer{flex:1}
  .who{font-size:12px;color:#cfe0f0}
  .btn{background:#2e7d54;color:#fff;border:0;border-radius:6px;padding:7px 12px;font-size:13px;font-weight:600;cursor:pointer}
  .btn.sec{background:#e3edf7;color:#16324f}
  .wrap{padding:12px 14px}
  .login{max-width:360px;margin:9vh auto;background:#fff;border:1px solid #dde3ea;border-radius:12px;padding:24px}
  .login h2{margin:0 0 4px;color:#16324f;font-size:19px}
  .login p{margin:0 0 16px;color:#7a8794;font-size:12.5px}
  .login input{width:100%;padding:10px;border:1px solid #cdd6df;border-radius:8px;font-size:14px;margin-bottom:10px}
  .login .btn{width:100%}
  .msg{font-size:12px;margin-top:10px;min-height:16px}
  .msg.err{color:#b40000}.msg.ok{color:#2e7d54}
  .scroll{overflow:auto;border:1px solid #dde3ea;border-radius:8px;max-height:82vh;background:#fff}
  table{border-collapse:collapse;width:100%;font-size:12px}
  thead th{position:sticky;top:0;background:#16324f;color:#fff;font-weight:600;font-size:11px;padding:6px 8px;text-align:left;white-space:nowrap;z-index:2}
  td{border-bottom:1px solid #eef1f5;padding:4px 8px;vertical-align:top}
  tbody tr:nth-child(even){background:#fbfcfe}
  tbody tr:hover td{background:#eef6ff}
  td.red{background:#ffe1e1;color:#b40000;font-weight:700}
  .grp td{background:#e8eef5;font-weight:700;color:#16324f;position:sticky;left:0}
  .kod{font-weight:700;color:#16324f;white-space:nowrap}
  .gnb .kod,.gnb .grp td{font-weight:400}
  .ed{border:1px dashed transparent;border-radius:4px;padding:2px 4px;min-width:60px;cursor:text}
  .ed:hover{border-color:#b7c6d6;background:#fffef2}
  input.cell,select.cell{font:inherit;border:1px solid #86a6c6;border-radius:4px;padding:2px 4px;width:100%}
  .saveflash{outline:2px solid #2e7d54;transition:outline .1s}
  .hint{font-size:11px;color:#8a97a4;margin:4px 2px}
  .stamp{font-size:11.5px;color:#0a6b3f;font-weight:700;margin:2px 2px 8px}
  .num{text-align:right;white-space:nowrap}
  .snpink{background:#ffd9ec} .itot td{background:#eef4fb;font-weight:700}
  .load{padding:30px;text-align:center;color:#8a97a4}
  .del{color:#b40000;cursor:pointer;font-weight:700;border:0;background:none;font-size:14px;padding:0 4px}
  .flow{background:#fff;border:1px solid #dde3ea;border-radius:8px;padding:10px 12px;margin-bottom:12px;line-height:1.8}
  .step{display:inline-block;background:#eef4fb;border:1px solid #d3e0ee;border-radius:8px;padding:3px 8px;font-weight:600;color:#16324f}
  .arr{color:#2e7d54;font-weight:700;margin:0 3px}
  h3.sec{margin:14px 2px 6px;color:#16324f;font-size:13px}
  .flow p{margin:0 0 7px}.flow p:last-child{margin:0}
  .tag{display:inline-block;background:#16324f;color:#fff;font-size:10px;font-weight:700;border-radius:5px;padding:1px 7px;margin-left:6px;vertical-align:middle}
  .tag.ok{background:#2e7d54}
  .muted{color:#7a8794;font-size:11.5px}
</style>
</head>
<body>
<div id="app"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://zehysygpqxqmrzangvuc.supabase.co";
const SUPABASE_KEY = "sb_publishable_ZCcDv4S7qH1hc9tuiv4__A_YVxmIpWc";

const memStore = {};
function safeStorage(){
  try{ const k="__arb_t"; window.localStorage.setItem(k,"1"); window.localStorage.removeItem(k); return window.localStorage; }
  catch(e){ return { getItem:k=> (k in memStore? memStore[k]:null), setItem:(k,v)=>{memStore[k]=String(v)}, removeItem:k=>{delete memStore[k]} }; }
}
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
  auth:{ persistSession:true, autoRefreshToken:true, detectSessionInUrl:false, storage:safeStorage() }
});

const app = document.getElementById("app");
let state = { tab:"gundem", email:"", session:null };
const PREFIX = { F:"Fabrika", G:"Yurtdışı / Genel", P:"PEM", S:"Şahsi", ARGE:"ARGE" };

function esc(s){ return (s==null?"":String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function fdate(s){ if(!s) return ""; const d=new Date(s); if(isNaN(d)) return esc(s); return String(d.getDate()).padStart(2,'0')+"."+String(d.getMonth()+1).padStart(2,'0')+"."+String(d.getFullYear()).slice(2); }
function money(n){ if(n==null||n==="") return ""; const v=Math.round(Number(n)); return isNaN(v)?"":v.toLocaleString("tr-TR"); }

/* ---------- AUTH ---------- */
function renderLogin(step){
  app.innerHTML = `
   <div class="login">
     <h2>Arbor Panolar</h2>
     <p>Giriş için e-postanı gir; sana 6 haneli bir kod göndereceğiz.</p>
     <input id="email" type="email" placeholder="ornek@arbor.com.tr" value="${esc(state.email)}" ${step==='code'?'disabled':''}>
     ${step==='code' ? `<input id="code" inputmode="numeric" placeholder="E-postana gelen 6 haneli kod">`:''}
     <button class="btn" id="go">${step==='code'?'Doğrula ve gir':'Giriş kodu gönder'}</button>
     <div class="msg" id="msg"></div>
   </div>`;
  document.getElementById("go").onclick = step==='code' ? doVerify : doSend;
}
function msg(t,ok){ const m=document.getElementById("msg"); if(m){ m.textContent=t; m.className="msg "+(ok?"ok":"err"); } }
async function doSend(){
  const email=document.getElementById("email").value.trim();
  if(!email){ msg("E-posta gir."); return; }
  state.email=email; msg("Kod gönderiliyor…",true);
  const {error}=await sb.auth.signInWithOtp({ email, options:{ shouldCreateUser:true } });
  if(error){ msg("Hata: "+error.message); return; }
  renderLogin('code'); msg("Kod e-postana gönderildi.",true);
}
async function doVerify(){
  const token=document.getElementById("code").value.trim();
  if(!token){ msg("Kodu gir."); return; }
  msg("Doğrulanıyor…",true);
  const {data,error}=await sb.auth.verifyOtp({ email:state.email, token, type:'email' });
  if(error){ msg("Hata: "+error.message); return; }
  state.session=data.session; renderApp();
}
async function doLogout(){ await sb.auth.signOut(); state.session=null; renderLogin('email'); }

/* ---------- APP SHELL ---------- */
function renderApp(){
  app.innerHTML = `
   <header>
     <div class="topbar">
       <h1>ARBOR</h1>
       <div class="spacer"></div>
       <button class="btn sec" id="refresh">Yenile</button>
     </div>
     <div class="tabs">
       <button data-t="gundem" class="${state.tab==='gundem'?'active':''}">Ana Gündem</button>
       <button data-t="aup" class="${state.tab==='aup'?'active':''}">AÜP</button>
       <button data-t="hazir" class="${state.tab==='hazir'?'active':''}">Hazır PEM/PRJ</button>
       <button data-t="so" class="${state.tab==='so'?'active':''}">SÖ</button>
       <button data-t="bilanco" class="${state.tab==='bilanco'?'active':''}">Bilanço</button>
       <button data-t="icmal" class="${state.tab==='icmal'?'active':''}">İcmal</button>
       <button data-t="ref" class="${state.tab==='ref'?'active':''}">Referans</button>
       <button data-t="formlar" class="${state.tab==='formlar'?'active':''}">Formlar</button>
       <button data-t="blueprint" class="${state.tab==='blueprint'?'active':''}">Blueprint</button>
     </div>
   </header>
   <div class="wrap" id="view"><div class="load">Yükleniyor…</div></div>`;
  document.getElementById("refresh").onclick=()=>loadView();
  document.querySelectorAll(".tabs button").forEach(b=>b.onclick=()=>{ state.tab=b.dataset.t; renderApp(); });
  loadView();
}
function loadView(){
  if(state.tab==='gundem') loadGundem();
  else if(state.tab==='hazir') loadHazir();
  else if(state.tab==='so') loadSo();
  else if(state.tab==='bilanco') loadBilanco();
  else if(state.tab==='icmal') loadIcmal();
  else if(state.tab==='ref') loadRef();
  else if(state.tab==='formlar') loadFormlar();
  else if(state.tab==='blueprint') loadBlueprint();
  else loadAup();
}
function fmtDamga(dg){ return (dg&&dg.length>=6)? dg.slice(4,6)+"."+dg.slice(2,4)+"."+dg.slice(0,2) : "—"; }
function dOnly(iso){ if(!iso) return "—"; const d=new Date(iso); return isNaN(d)?"—":String(d.getDate()).padStart(2,"0")+"."+String(d.getMonth()+1).padStart(2,"0")+"."+String(d.getFullYear()).slice(2); }
async function erpStamp(){ const {data}=await sb.from("erp_yukleme").select("damga").order("damga",{ascending:false}).limit(1); return data&&data[0]?fmtDamga(data[0].damga):"—"; }
async function tblStamp(t){ const {data}=await sb.from(t).select("updated_at").order("updated_at",{ascending:false}).limit(1); return data&&data[0]?dOnly(data[0].updated_at):"—"; }
function stampHTML(d){ return '<div class="stamp">Son güncelleme: '+(d||"—")+'</div>'; }

/* ---------- ANA GÜNDEM (blok = kod_prefix; İlgili = kişi; kapat = sil) ---------- */
async function loadGundem(){
  const view=document.getElementById("view");
  const [g,ar]=await Promise.all([
    sb.from("ana_gundem").select("*"),
    sb.from("gundem_arge").select("*")
  ]);
  const err=g.error||ar.error;
  if(err){ view.innerHTML=`<div class="load">Hata: ${esc(err.message)}</div>`; return; }
  const man=(g.data||[]).map(r=>Object.assign({_ed:true},r));
  const der=(ar.data||[]).map(r=>Object.assign({_ed:false},r));
  const all=man.concat(der);
  const onc=r=>{ const m=String(r.son_durum||"").match(/Öncelik\s*(\d+)/i); return m?parseInt(m[1]):(r.sira!=null?r.sira:999); };
  const ac=r=>{ const m=String(r.son_durum||"").match(/(\d{2})\.(\d{2})\.(\d{4})/); return m?(m[3]+m[2]+m[1]):"99999999"; };
  const isA=r=>/Öncelik/i.test(String(r.son_durum||""));
  const groups={};
  all.forEach(r=>{ const k=isA(r)?"ARGE":(r.ilgili||"—"); (groups[k]=groups[k]||[]).push(r); });
  Object.keys(groups).forEach(k=>groups[k].sort((a,b)=>{
    const aA=isA(a),bA=isA(b);
    if(aA!==bA) return aA?1:-1;
    if(aA){ const oa=onc(a),ob=onc(b); if(oa!==ob) return oa-ob; const ca=ac(a),cb=ac(b); if(ca!==cb) return ca.localeCompare(cb); return String(a.kod).localeCompare(String(b.kod)); }
    return String(a.kod).localeCompare(String(b.kod));
  }));
  const keys=Object.keys(groups).sort((a,b)=> ((a==="ARGE")-(b==="ARGE")) || groups[b].length-groups[a].length || a.localeCompare(b));
  let rows="";
  keys.forEach(k=>{
    rows+=`<tr class="grp"><td colspan="3">${esc(k)} · ${groups[k].length}</td></tr>`;
    groups[k].forEach(r=>{
      if(r._ed){
        rows+=`<tr data-id="${r.id}">
          <td class="kod">${esc(r.kod)}</td>
          <td>${esc(r.konu)}</td>
          <td><button class="del" title="Kapat (sil)" data-id="${r.id}">✕</button></td>
        </tr>`;
      } else {
        rows+=`<tr style="background:#fafbfd" title="ERP-türevi · salt-okur">
          <td class="kod" style="color:#5a6b7d">${esc(r.kod)}</td>
          <td>${esc(r.konu)}</td>
          <td></td>
        </tr>`;
      }
    });
  });
  const st=await erpStamp();
  view.innerHTML=`${stampHTML(st)}<div class="hint">Ana Gündem — İlgili'ye göre gruplu; ARGE ayrı blok (öncelik→açılış). ✕ kapatır (kalıcı sil). Toplam ${all.length}.</div>
    <div class="scroll"><table class="gnb">
    <thead><tr><th>Kod</th><th>Konu</th><th></th></tr></thead>
    <tbody>${rows}</tbody></table></div>`;
  view.querySelectorAll(".ed").forEach(el=>el.onclick=()=>startEdit(el));
  view.querySelectorAll(".del").forEach(b=>b.onclick=()=>delGundem(b.dataset.id));
}

async function delGundem(id){
  if(!confirm("Bu gündem maddesi kalıcı olarak silinsin mi? (kapat = sil)")) return;
  const {error}=await sb.from("ana_gundem").delete().eq("id",id);
  if(error){ alert(error.message); return; }
  loadGundem();
}
function startEdit(el){
  if(el.querySelector("input,select")) return;
  const f=el.dataset.f, type=el.dataset.type, id=el.closest("tr").dataset.id;
  const cur=el.textContent.trim().replace(/^\+.*/,"").replace(/^tarih$/,"");
  const inp=document.createElement("input"); inp.className="cell"; inp.type = type==='date'?'date':'text';
  inp.value = type==='date'? "": cur;
  el.innerHTML=""; el.appendChild(inp); inp.focus();
  const commit=async()=>{
    let val=inp.value;
    if(type==='date' && !val){ el.innerHTML='<span style=color:#b7c6d6>tarih</span>'; return; }
    const {error}=await sb.from("ana_gundem").update({[f]:val||null}).eq("id",id);
    if(error){ el.innerHTML='<span style=color:#b40000>hata</span>'; alert(error.message); return; }
    el.textContent = type==='date'? fdate(val) : (val|| "");
    el.classList.add("saveflash"); setTimeout(()=>el.classList.remove("saveflash"),400);
  };
  inp.onblur=commit;
  inp.onkeydown=e=>{ if(e.key==='Enter'){e.preventDefault();inp.blur();} if(e.key==='Escape'){loadGundem();} };
}

/* ---------- SÖ (so_panosu, bölüm bloklu) ---------- */
async function loadSo(){
  const view=document.getElementById("view");
  const {data,error}=await sb.from("so_panosu").select("*");
  if(error){ view.innerHTML=`<div class="load">Hata: ${esc(error.message)}</div>`; return; }
  const groups={};
  (data||[]).forEach(r=>{ const k=r.bolum||"—"; (groups[k]=groups[k]||[]).push(r); });
  let rows="";
  Object.keys(groups).sort().forEach(k=>{
    rows+=`<tr class="grp"><td colspan="6">${esc(k)} · ${groups[k].length}</td></tr>`;
    groups[k].forEach(r=>{
      rows+=`<tr>
        <td class="kod">${esc(r.nr)}</td>
        <td class="num">${fdate(r.tarih)}</td>
        <td>${esc(r.durum)}</td>
        <td>${esc(r.proje_adi||r.proje_numarasi)}</td>
        <td>${esc(r.problem)}</td>
        <td>${esc(r.bildiren)}</td>
      </tr>`;
    });
  });
  const st=await erpStamp();
  view.innerHTML=`${stampHTML(st)}<div class="hint">SÖ — açık Sorun ve Öneriler (Şantiye/PEM), <b>kusurlu birim = bölüme</b> göre bloklu, açılış tarihine göre. ${(data||[]).length} kayıt.</div>
    <div class="scroll"><table>
    <thead><tr><th>NR</th><th>Açılış</th><th>Durum</th><th>Proje</th><th>Problem</th><th>Bildiren</th></tr></thead>
    <tbody>${rows}</tbody></table></div>`;
}

/* ---------- HAZIR PEM/PRJ ---------- */
async function loadHazir(){
  const view=document.getElementById("view");
  const {data,error}=await sb.from("hazir_pem_prj").select("*");
  if(error){ view.innerHTML=`<div class="load">Hata: ${esc(error.message)}</div>`; return; }
  let rows="";
  (data||[]).forEach(r=>{
    rows+=`<tr>
      <td class="kod">${esc(r.tur)}</td>
      <td class="kod">${esc(r.no)}</td>
      <td>${esc(r.proje_adi)}</td>
      <td>${esc(r.ek_bilgi)}</td>
      <td class="num">${esc(r.adet)}</td>
      <td class="num">${fdate(r.hazir_tarihi)}</td>
      <td>${esc(r.onur_guncel)}</td>
    </tr>`;
  });
  const st=await erpStamp();
  view.innerHTML=`${stampHTML(st)}<div class="hint">Hazır PEM/PRJ — Sevke Hazır PEM (durum 3) + PRJ (8/8.1), birleşik salt-okur. ${(data||[]).length} kalem.</div>
    <div class="scroll"><table>
    <thead><tr><th>Tür</th><th>No</th><th>Proje Adı</th><th>Ek Bilgi/Fiyat</th><th>Adet</th><th>Hazır Tarihi</th><th>Sevk Durumu (Onur)</th></tr></thead>
    <tbody>${rows}</tbody></table></div>`;
}

/* ---------- AÜP (salt-okur) ---------- */
async function loadAup(){
  const view=document.getElementById("view");
  const [{data,error},oz]=await Promise.all([sb.from("aup_panosu").select("*").order("aup",{ascending:true}), sb.from("aup_ozet").select("*").order("damga",{ascending:false}).limit(2)]);
  if(error){ view.innerHTML=`<div class="load">Hata: ${esc(error.message)}</div>`; return; }
  const dk=d=>{ d=String(d||""); const i=d.indexOf(" "); return i<0?d:(d.slice(0,i)+" "+d.slice(i+1,i+4)); };
  let rows="";
  data.forEach(r=>{
    const ga=r.gyt_aup, ky=r.kayma;
    rows+=`<tr>
      <td class="kod">${esc(String(r.proje_no||"").slice(-6))}</td>
      <td>${esc(String(r.proje_adi||"").slice(0,30))}</td>
      <td>${esc(dk(r.proje_durumu))}</td>
      <td class="num">${esc(r.adet)}</td>
      <td class="num">${fdate(r.mvt)}</td>
      <td class="num">${fdate(r.aup)}</td>
      <td class="num">${fdate(r.gyt)}</td>
      <td class="num ${ga>0?'red':''}">${ga==null?'':ga}</td>
      <td class="num ${ky>=3?'red':''}">${ky==null?'':ky}</td>
      <td class="num">${money(r.anlasma_fiyati)}</td>
      <td${r.satis_santiye_notlari?' class="snpink"':''}>${esc(r.satis_santiye_notlari)}</td>
      <td>${esc(r.uretim_notlari)}</td>
    </tr>`;
  });
  const st=await erpStamp();
  const o0=(oz.data&&oz.data[0])||{}, o1=(oz.data&&oz.data[1])||{};
  const pct=(a,b)=>{ a=Number(a)||0; b=Number(b)||0; if(!b) return ""; const v=Math.round((a-b)/Math.abs(b)*100); return ' <span style="color:'+(v>=0?'#0a6b3f':'#b23a2e')+'">('+(v>=0?'+':'−')+Math.abs(v)+'%)</span>'; };
  const dgun=(a,b)=>{ const v=Math.round((Number(a)||0)-(Number(b)||0)); const c=v>0?'#0a6b3f':(v<0?'#b23a2e':'#6a7888'); return ' <span style="color:'+c+'">('+(v>0?'+':(v<0?'−':''))+Math.abs(v)+' gün)</span>'; };
  const gk=Number(o0.global_kayma||0).toFixed(1).replace(".",",");
  const stamp='<div class="stamp">Son güncelleme: '+(st||"—")+' · Adet: '+money(o0.toplam_adet)+pct(o0.toplam_adet,o1.toplam_adet)+' · Tutar: '+money(o0.toplam_tutar)+' €'+pct(o0.toplam_tutar,o1.toplam_tutar)+' · Global kayma: '+gk+' gün'+dgun(o0.global_kayma,o1.global_kayma)+'</div>';
  view.innerHTML=`${stamp}<div class="hint">AÜP — ERP snapshot üstünde canlı görüntü (salt-okur). ${data.length} proje · PST-AÜP&gt;0 ve Kayma≥3 kırmızı.</div>
    <div class="scroll"><table>
    <thead><tr><th>NO</th><th>PROJE ADI</th><th>DURUM</th><th>Ad</th><th>MVT</th><th>AÜP</th><th>PST</th><th>PST-AÜP</th><th>Kayma</th><th>TUTAR €</th><th>Satış-Şantiye Notu</th><th>Üretim Notu</th></tr></thead>
    <tbody>${rows}</tbody></table></div>`;
}


/* ---------- BILANÇO (bilanco_ozet view + gider detay) ---------- */
async function loadBilanco(){
  const view=document.getElementById("view");
  const {data,error}=await sb.from("bilanco_ozet").select("*");
  if(error){ view.innerHTML=`<div class="load">Hata: ${esc(error.message)}</div>`; return; }
  const rowsD=(data||[]).slice().sort((a,b)=>b.yil-a.yil);
  const cur=rowsD[0]||{};
  const kar=cur.kar_tl, zar=kar<0;
  function card(t,v,s2,cls){ return `<div style="background:#fff;border:1px solid #e3e8ee;border-radius:10px;padding:10px 12px;border-left:4px solid ${cls}"><div style="font-size:11px;color:#6a7888">${t}</div><div style="font-size:18px;font-weight:700;color:#16324f">${v}</div><div style="font-size:10.5px;color:#93a1b0;margin-top:3px">${s2}</div></div>`; }
  const cards=`<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:8px;margin:6px 0 12px">
    ${card("Net Satış ("+cur.yil+")", money(cur.net_tl)+" TL", "≈ "+money(cur.net_eur)+" €", "#0a6b3f")}
    ${card("Toplam Maliyet", money(cur.toplam_gider_tl)+" TL", "710 + 720 + 730", "#b8863a")}
    ${card("Kâr/Zarar", (zar?"−":"+")+money(Math.abs(kar))+" TL", "Net − Maliyet", zar?"#b23a2e":"#0a6b3f")}
    ${card("Kâr Marjı", (cur.marj==null?"":Number(cur.marj).toFixed(1).replace(".",","))+" %", "Kapsam: Arbor Türkiye", zar?"#b23a2e":"#0a6b3f")}
  </div>`;
  let rows="";
  rowsD.forEach(r=>{
    const k=r.kar_tl, hasK=k!=null;
    const kc=hasK?`<td class="num" style="color:${k>=0?'#0a6b3f':'#b23a2e'};font-weight:600">${k>=0?'+':'−'}${money(Math.abs(k))}</td>`:'<td class="num" style="color:#c2ccd6">—</td>';
    const mc=hasK?`<td class="num" style="color:${k>=0?'#0a6b3f':'#b23a2e'}">${Number(r.marj).toFixed(1).replace(".",",")}%</td>`:'<td class="num" style="color:#c2ccd6">—</td>';
    const g=v=>v==null?'<td class="num" style="color:#c2ccd6">—</td>':`<td class="num">${money(v)}</td>`;
    rows+=`<tr><td class="kod">${esc(r.yil)}</td><td class="num">${money(r.net_tl)}</td><td class="num">${money(r.net_eur)}</td>${g(r.k710_tl)}${g(r.k720_tl)}${g(r.k730_tl)}${g(r.toplam_gider_tl)}${kc}${mc}</tr>`;
  });
  const st=await tblStamp("bilanco_yil");
  view.innerHTML=`${stampHTML(st)}<div class="hint">Bilanço — <b>Arbor Türkiye</b> (yalnız Türkiye kapsamı). Gelir = Yıllık İcmal, gider = SB tablosu. 2011–2024 Türkiye Satış/Gider/Kâr dosyasından; 2022–2025 tam kâr/zarar.</div>
    ${cards}
    <div class="scroll"><table>
    <thead><tr><th>Yıl</th><th class="num">Net Satış (TL)</th><th class="num">Net (€)</th><th class="num">710 Malzeme</th><th class="num">720 İşçilik</th><th class="num">730 GÜG</th><th class="num">Toplam Gider</th><th class="num">Kâr/Zarar</th><th class="num">Marj</th></tr></thead>
    <tbody>${rows}</tbody></table></div>`;
}


/* ---------- YILLIK İCMAL (icmal_ozet view) ---------- */

  if(error){ view.innerHTML=`<div class="load">Hata: ${esc(error.message)}</div>`; return; }
  const F=["adet","dk1_ad","m2","net_eur","ort_kur","net_tl","netfi_eur_m2","netfi_eur_ad","id_per","ur_per","top_per","ciro_per_eur","isk","kapasite_ad_ay","onaysiz_ad","onay_ter_hf","urt_ad","son_proje_cikis","so_alinan_eur","so_muht_eur","fa_alinan_eur","fa_muht_eur","top_alinan_eur","alinan_ter_hf","top_muht_eur","fr_isk_pct","dig_isk_pct"];
  let rows="";
  (data||[]).forEach(r=>{
    let tds='<td class="kod">'+esc(r.donem)+'</td>';
    F.forEach(f=>{ tds+='<td class="num">'+esc(r[f])+'</td>'; });
    rows+='<tr'+(r.is_total?' class="itot"':'')+'>'+tds+'</tr>';

  const st=await tblStamp("icmal_yil");

  const head=TH.map((h,i)=>i===0?('<th>'+h+'</th>'):('<th class="num">'+h+'</th>')).join("");
  view.innerHTML=`${stampHTML(st)}<div class="hint">\u0130cmal \u2014 eski panonun i\u00e7eri\u011fi (ayl\u0131k sat\u0131rlar + <b>y\u0131l toplamlar\u0131</b> koyu). Gelir kayna\u011f\u0131 bilan\u00e7oyu besler.</div>
    <div class="scroll"><table>
    <thead><tr>${head}</tr></thead>
    <tbody>${rows}</tbody></table></div>`;
}

/* ---------- REFERANS (kisiler / odemeler / parametreler + işleyiş) ---------- */
async function loadRef(){
  const view=document.getElementById("view");
  const [k,o,p]=await Promise.all([
    sb.from("kisiler").select("*").order("kod"),
    sb.from("odemeler").select("*"),
    sb.from("parametreler").select("*").order("anahtar")
  ]);
  const err=k.error||o.error||p.error;
  if(err){ view.innerHTML=`<div class="load">Hata: ${esc(err.message)}</div>`; return; }
  let kr=""; (k.data||[]).forEach(r=>{ kr+=`<tr><td class="kod">${esc(r.kod)}</td><td>${esc(r.tam_ad)}</td><td>${esc(r.bolum)||''}</td><td>${esc(r.email)||'<span style=color:#b7c6d6>—</span>'}</td><td>${esc(r.rol)||''}</td></tr>`; });
  let or=""; (o.data||[]).forEach(r=>{ or+=`<tr><td>${esc(r.tam_ad)}</td><td>${esc(r.tur)}</td><td class="num">${r.tutar==null?'':esc(r.tutar)} ${esc(r.para_birimi)}</td><td>${esc(r.aciklama)}</td></tr>`; });
  let pr=""; (p.data||[]).forEach(r=>{ pr+=`<tr><td class="kod">${esc(r.anahtar)}</td><td>${esc(typeof r.deger==='string'?r.deger:JSON.stringify(r.deger))}</td><td>${esc(r.aciklama)}</td></tr>`; });
  const st=await tblStamp("kisiler");
  view.innerHTML=`${stampHTML(st)}
    <div class="flow"><b>Güncel işleyiş:</b> <span class="step">Melih ERP'yi manuel çeker</span><span class="arr">→</span><span class="step">Supabase Storage erp/&lt;YYMMDD&gt;/</span><span class="arr">→</span><span class="step">worker · upsert</span><span class="arr">→</span><span class="step">Postgres snapshot</span><span class="arr">→</span><span class="step">bu app</span></div>
    <h3 class="sec">Kişiler (${(k.data||[]).length})</h3>
    <div class="scroll"><table><thead><tr><th>Kod</th><th>Ad Soyad</th><th>Bölüm</th><th>E-posta</th><th>Rol</th></tr></thead><tbody>${kr}</tbody></table></div>
    <h3 class="sec">Ödemeler (referans — süreç yok)</h3>
    <div class="scroll"><table><thead><tr><th>Kişi</th><th>Tür</th><th>Tutar</th><th>Açıklama</th></tr></thead><tbody>${or}</tbody></table></div>
    <h3 class="sec">Parametreler</h3>
    <div class="scroll"><table><thead><tr><th>Anahtar</th><th>Değer</th><th>Açıklama</th></tr></thead><tbody>${pr}</tbody></table></div>
    <h3 class="sec">İşleyiş — Süreçler</h3>
    <div class="hint">Süreçler Melih'in tarif ettiği işleyişi yansıtır; her biri tetik → sorumlu → çıktı zinciriyle yazılmıştır.</div>
    <div class="flow"><b>1. ERP İngest Hattı</b><span class="tag">tek P süreci</span>
      <p>Melih ERP'yi manuel çeker (Prj·Sö·Arge·Cam·Pem) → Excel'ler Supabase Storage <code>erp/&lt;YYMMDD&gt;/</code> → worker/Edge Function idempotent upsert → snapshot tabloları → app view'leri.</p>
    </div>
    <div class="flow"><b>2. SÖ Bölüm Gündem Süreci</b><span class="tag ok">SÖ sorumlusu = EA (Enes Artan)</span>
      <p>Her ERP çekiminden sonra tüm sorun ve öneriler (SÖ'ler) Claude tarafından, EA (Enes Artan) ile paylaşılan bir panoya işlenir.</p>
      <p>EA, o hafta gündeme alacağı bölümü panoda seçer; seçilen bölüme ait olanların yine EA tarafından <b>Pazartesi akşamına kadar</b> incelenip <b>"gündeme alındı"</b>ya çevrilmesi gerektiğini belirten bir mail Claude tarafından EA'ya gönderilir.</p>
      <p>Claude, <b>Salı sabahı</b> paylaşılan panoda seçilen bölümle ilgili tüm SÖ'lerin işlenip işlenmediğini kontrol eder; <b>eksik varsa</b> mail ile EA'dan ister ve bu kontrolü <b>Çarşamba sabahı</b> tekrarlar.</p>
      <p class="muted"><b>EA formu (ayrı):</b> <a href="ea/" target="_blank">app/ea/</a> — EA bunu kendi web formundan yapar; çalışanlar Melih'in panolarına doğrudan yazmaz, form sonucu buraya salt-okur yansır.</p><p class="muted">Fabrika bölümü SÖ.xlsx KUSURLU BİRİM sütunundan gelir; boşsa "Atanmamış". Açık SÖ kümesi: DURUM ≤ 7.2 &amp; NİTELİK PEM/Şantiye.</p>
    </div>
    <div class="flow"><b>3. Bilanço Süreci</b><span class="tag">Türkiye · gider=SB · gelir=İcmal</span>
      <p>SB (Muhasebe) gider tablosu → yeni dönem gideri gelince Melih iletir → Claude bilanço panosunu günceller. Kapsam yalnız Arbor Türkiye. Bilanço = Net Satış (İcmal) − Toplam Maliyet (710+720+730, SB).</p>
    </div>
    <div class="flow"><b>4. Yıllık İcmal Süreci</b><span class="tag">tek gelir kaynağı</span>
      <p>Yıllık İcmal, aylık/yıllık Net Satış'ın tek kaynağıdır ve bilançonun gelir tarafını besler. PRJ/ERP çekiminden türetilir; satış raporları ay başı mapping ile iş hacmini canlı tutar.</p>
    </div>
    <div class="flow"><b>5. Satış Raporları Süreci</b><span class="tag">AK · FA/FY · SO</span>
      <p>Kaynak raporu gönderir → Claude "Satış Yorum" + İcmal'e işler → mail "Rapor" klasörüne taşınır. AK (UK) ve FA/FY (Fransa/ihracat) ayın 1'i ve 15'i; SO (yurtiçi) yalnız ayın 1'i.</p>
      <p class="muted">Eskalasyon: ayın 5. ve 20. günü gelmeyen kaynağa tek hatırlatma; önce Melih, sonra ilgili.</p>
    </div>
    <div class="flow"><b>6. Prim / Ödeme Süreci</b>
      <p>Aylık prim banknot denominasyonu 100 $ → 50 € → 200 TL. Sabit: Onur 200 €/ay, Özlem Y. 7.000 TL/ay, Orhan 20.000 TL/ay. Oransal: Özgül %0,01 tahsilat. Değişken: Fatma proje primi.</p>
      <p class="muted">Ödeme onayı: Melih "Uygundur" (52.1) onaya sunulur; Osman onaylı iç/fabrika (52.25) sorulmadan işlenir.</p>
    </div>
    <div class="flow"><b>7. Sevke-Hazır / PEM Takip</b><span class="tag">Onur (Sevkiyat)</span>
      <p>Onur Ekinci sevke-hazır PEM/PRJ durumunu ve Excel'i günceller. PEM İlgili DURUM bazlı: 1.2 → Berat (dış sipariş), 1.3/2 → Semih (üretim).</p>
    </div>
    <div class="flow"><b>8. ARGE Süreci</b><span class="tag ok">İlgili = EU</span>
      <p>ERP Arge.xlsx İLGİLİ sütunu (Ömer/Tarık) yok sayılır; tüm ARGE'nin İlgili'si Enes Uzun'da toplanır (K73). Ana Gündem'de ARGE ayrı blok.</p>
    </div>
`;
}

  const forms=[
    {ad:"EA — SÖ Haftalık Gündem Formu", who:"Enes Artan · Kalite", url:"ea/", desc:"Hafta bölümünü seçer, sorun ve önerileri 'gündeme alındı'ya çevirir. Yazar: so_ea_form."},
    {ad:"Onur — Sevk Durumu Formu", who:"Onur Ekinci · Sevkiyat", url:"onur/", desc:"Hazır PEM/PRJ kalemlerinin güncel sevk durumunu girer. Yazar: sevk_durumu_onur."}

}
