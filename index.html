(function(){var BOOT=null,BUSY=false;
async function peek(){if(BUSY)return;BUSY=true;
 try{var r=await fetch(".panolar_src_hash?ts="+Date.now(),{cache:"no-store"});
  if(r.ok){var h=(await r.text()).trim();
   if(!BOOT){BOOT=h;}
   else if(h&&h!==BOOT){location.reload();}}}catch(e){}

peek();setInterval(peek,120000);
document.addEventListener("visibilitychange",function(){if(!document.hidden)peek();});
