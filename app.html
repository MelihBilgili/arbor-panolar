<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Arbor — Panolar</title>
<style>
  :root{color-scheme:light}
  *{box-sizing:border-box}
  body{margin:0;font-family:'Segoe UI',system-ui,sans-serif;background:#f7f8fa;color:#1c2430;font-size:13px}
  header{background:#16324f;color:#fff;padding:0}
  .topbar{display:flex;align-items:center;gap:14px;padding:8px 14px}
  .topbar h1{font-size:16px;margin:0;font-weight:700;letter-spacing:.5px}
  .tabs{display:flex;gap:4px;padding:0 10px}
  .tabs button{background:transparent;color:#cfe0f0;border:0;padding:9px 16px;font-size:13px;font-weight:600;cursor:pointer;border-bottom:3px solid transparent}
  .tabs button.active{color:#fff;border-bottom-color:#fff;background:rgba(255,255,255,.08)}
  .spacer{flex:1}
  .who{font-size:12px;color:#cfe0f0}
  .btn{background:#2e7d54;color:#fff;border:0;border-radius:6px;padding:7px 12px;font-size:13px;font-weight:600;cursor:pointer}
  .btn.sec{background:#e3edf7;color:#16324f}
  .wrap{padding:12px 14px}
  /* login */
  .login{max-width:360px;margin:9vh auto;background:#fff;border:1px solid #dde3ea;border-radius:12px;padding:24px}
  .login h2{margin:0 0 4px;color:#16324f;font-size:19px}
  .login p{margin:0 0 16px;color:#7a8794;font-size:12.5px}
  .login input{width:100%;padding:10px;border:1px solid #cdd6df;border-radius:8px;font-size:14px;margin-bottom:10px}
  .login .btn{width:100%}
  .msg{font-size:12px;margin-top:10px;min-height:16px}
  .msg.err{color:#b40000}.msg.ok{color:#2e7d54}
  /* tables */
  .scroll{overflow:auto;border:1px solid #dde3ea;border-radius:8px;max-height:82vh;background:#fff}
  table{border-collapse:collapse;width:100%;font-size:12px}
  thead th{position:sticky;top:0;background:#16324f;color:#fff;font-weight:600;font-size:11px;padding:6px 8px;text-align:left;white-space:nowrap;z-index:2}
  td{border-bottom:1px solid #eef1f5;padding:4px 8px;vertical-align:top}
  tbody tr:nth-child(even){background:#fbfcfe}
  tbody tr:hover td{background:#eef6ff}
  td.red{background:#ffe1e1;color:#b40000;font-weight:700}
  .grp td{background:#e8eef5;font-weight:700;color:#16324f;position:sticky;left:0}
  .kod{font-weight:700;color:#16324f;white-space:nowrap}
  .ed{border:1px dashed transparent;border-radius:4px;padding:2px 4px;min-width:60px;cursor:text}
  .ed:hover{border-color:#b7c6d6;background:#fffef2}
  input.cell,select.cell{font:inherit;border:1px solid #86a6c6;border-radius:4px;padding:2px 4px;width:100%}
  .saveflash{outline:2px solid #2e7d54;transition:outline .1s}
  .hint{font-size:11px;color:#8a97a4;margin:4px 2px}
  .num{text-align:right;white-space:nowrap}
  .load{padding:30px;text-align:center;color:#8a97a4}
</style>
</head>
<body>
<div id="app"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://zehysygpqxqmrzangvuc.supabase.co";
const SUPABASE_KEY = "sb_publishable_ZCcDv4S7qH1hc9tuiv4__A_YVxmIpWc";

const memStore = {};
function safeStorage(){
  try{ const k="__arb_t"; window.localStorage.setItem(k,"1"); window.localStorage.removeItem(k); return window.localStorage; }
  catch(e){ return { getItem:k=> (k in memStore? memStore[k]:null), setItem:(k,v)=>{memStore[k]=String(v)}, removeItem:k=>{delete memStore[k]} }; }
}
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
  auth:{ persistSession:true, autoRefreshToken:true, detectSessionInUrl:false, storage:safeStorage() }
});

const app = document.getElementById("app");
let state = { tab:"gundem", email:"", session:null };

function esc(s){ return (s==null?"":String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function fdate(s){ if(!s) return ""; const d=new Date(s); if(isNaN(d)) return esc(s); return String(d.getDate()).padStart(2,'0')+"."+String(d.getMonth()+1).padStart(2,'0')+"."+String(d.getFullYear()).slice(2); }
function money(n){ if(n==null||n==="") return ""; const v=Math.round(Number(n)); return isNaN(v)?"":v.toLocaleString("tr-TR"); }

/* ---------- AUTH ---------- */
function renderLogin(step){
  app.innerHTML = `
   <div class="login">
     <h2>Arbor Panolar</h2>
     <p>Giriş için e-postanı gir; sana 6 haneli bir kod göndereceğiz.</p>
     <input id="email" type="email" placeholder="ornek@arbor.com.tr" value="${esc(state.email)}" ${step==='code'?'disabled':''}>
     ${step==='code' ? `<input id="code" inputmode="numeric" placeholder="E-postana gelen 6 haneli kod">`:''}
     <button class="btn" id="go">${step==='code'?'Doğrula ve gir':'Giriş kodu gönder'}</button>
     <div class="msg" id="msg"></div>
   </div>`;
  document.getElementById("go").onclick = step==='code' ? doVerify : doSend;
}
function msg(t,ok){ const m=document.getElementById("msg"); if(m){ m.textContent=t; m.className="msg "+(ok?"ok":"err"); } }
async function doSend(){
  const email=document.getElementById("email").value.trim();
  if(!email){ msg("E-posta gir."); return; }
  state.email=email; msg("Kod gönderiliyor…",true);
  const {error}=await sb.auth.signInWithOtp({ email, options:{ shouldCreateUser:true } });
  if(error){ msg("Hata: "+error.message); return; }
  renderLogin('code'); msg("Kod e-postana gönderildi.",true);
}
async function doVerify(){
  const token=document.getElementById("code").value.trim();
  if(!token){ msg("Kodu gir."); return; }
  msg("Doğrulanıyor…",true);
  const {data,error}=await sb.auth.verifyOtp({ email:state.email, token, type:'email' });
  if(error){ msg("Hata: "+error.message); return; }
  state.session=data.session; renderApp();
}
async function doLogout(){ await sb.auth.signOut(); state.session=null; renderLogin('email'); }

/* ---------- APP SHELL ---------- */
function renderApp(){
  app.innerHTML = `
   <header>
     <div class="topbar">
       <h1>ARBOR</h1>
       <div class="spacer"></div>
       <span class="who">${esc(state.session?.user?.email||"")}</span>
       <button class="btn sec" id="refresh">Yenile</button>
       <button class="btn sec" id="logout">Çıkış</button>
     </div>
     <div class="tabs">
       <button data-t="gundem" class="${state.tab==='gundem'?'active':''}">Ana Gündem</button>
       <button data-t="aup" class="${state.tab==='aup'?'active':''}">AÜP</button>
     </div>
   </header>
   <div class="wrap" id="view"><div class="load">Yükleniyor…</div></div>`;
  document.getElementById("logout").onclick=doLogout;
  document.getElementById("refresh").onclick=()=>loadView();
  document.querySelectorAll(".tabs button").forEach(b=>b.onclick=()=>{ state.tab=b.dataset.t; renderApp(); });
  loadView();
}
function loadView(){ state.tab==='gundem' ? loadGundem() : loadAup(); }

/* ---------- ANA GÜNDEM (düzenlenebilir) ---------- */
async function loadGundem(){
  const view=document.getElementById("view");
  const {data,error}=await sb.from("ana_gundem").select("*").order("ilgili",{ascending:true}).order("sira",{ascending:true,nullsFirst:false});
  if(error){ view.innerHTML=`<div class="load">Hata: ${esc(error.message)}</div>`; return; }
  const groups={};
  data.forEach(r=>{ const g=r.ilgili||"—"; (groups[g]=groups[g]||[]).push(r); });
  let rows="";
  Object.keys(groups).sort().forEach(g=>{
    rows+=`<tr class="grp"><td colspan="6">${esc(g)} · ${groups[g].length}</td></tr>`;
    groups[g].forEach(r=>{
      rows+=`<tr data-id="${r.id}">
        <td class="kod">${esc(r.kod)}</td>
        <td><b>${esc(r.konu)}</b></td>
        <td><div class="ed" data-f="son_durum">${esc(r.son_durum)||'<span style=color:#b7c6d6>+ durum</span>'}</div></td>
        <td>${esc(r.bolum)}</td>
        <td><div class="ed" data-f="takip_gunu" data-type="date">${fdate(r.takip_gunu)||'<span style=color:#b7c6d6>tarih</span>'}</div></td>
        <td><div class="ed" data-f="statu" data-type="statu">${esc(r.statu)}</div></td>
      </tr>`;
    });
  });
  view.innerHTML=`<div class="hint">Ana Gündem — hücreye tıklayıp düzenleyebilirsin (doğrudan kaydedilir). ${data.length} kalem.</div>
    <div class="scroll"><table>
    <thead><tr><th>Kod</th><th>Konu</th><th>Son durum</th><th>Bölüm</th><th>Takip</th><th>Statü</th></tr></thead>
    <tbody>${rows}</tbody></table></div>`;
  view.querySelectorAll(".ed").forEach(el=>el.onclick=()=>startEdit(el));
}
function startEdit(el){
  if(el.querySelector("input,select")) return;
  const f=el.dataset.f, type=el.dataset.type, id=el.closest("tr").dataset.id;
  const cur=el.textContent.trim().replace(/^\+.*/,"").replace(/^tarih$/,"");
  let inp;
  if(type==='statu'){ inp=document.createElement("select"); inp.className="cell"; ["acik","cozuldu"].forEach(o=>{const op=document.createElement("option");op.value=o;op.textContent=o;if(o===cur)op.selected=true;inp.appendChild(op);}); }
  else { inp=document.createElement("input"); inp.className="cell"; inp.type = type==='date'?'date':'text';
    if(type==='date'){ /* keep ISO if present */ } inp.value = type==='date'? "": cur; }
  el.innerHTML=""; el.appendChild(inp); inp.focus();
  const commit=async()=>{
    let val=inp.value;
    if(type==='date' && !val){ el.innerHTML='<span style=color:#b7c6d6>tarih</span>'; return; }
    const {error}=await sb.from("ana_gundem").update({[f]:val||null}).eq("id",id);
    if(error){ el.innerHTML='<span style=color:#b40000>hata</span>'; alert(error.message); return; }
    el.textContent = type==='date'? fdate(val) : (val|| "");
    el.classList.add("saveflash"); setTimeout(()=>el.classList.remove("saveflash"),400);
  };
  inp.onblur=commit;
  inp.onkeydown=e=>{ if(e.key==='Enter'){e.preventDefault();inp.blur();} if(e.key==='Escape'){loadGundem();} };
}

/* ---------- AÜP (salt-okur) ---------- */
async function loadAup(){
  const view=document.getElementById("view");
  const {data,error}=await sb.from("aup_panosu").select("*").order("aup",{ascending:true});
  if(error){ view.innerHTML=`<div class="load">Hata: ${esc(error.message)}</div>`; return; }
  let rows="";
  data.forEach(r=>{
    const ga=r.gyt_aup, ky=r.kayma;
    rows+=`<tr>
      <td class="kod">${esc(r.proje_no)}</td>
      <td>${esc(r.proje_adi)}</td>
      <td>${esc(r.proje_durumu)}</td>
      <td class="num">${esc(r.adet)}</td>
      <td class="num">${fdate(r.mvt)}</td>
      <td class="num">${fdate(r.aup)}</td>
      <td class="num">${fdate(r.gyt)}</td>
      <td class="num ${ga>0?'red':''}">${ga==null?'':ga}</td>
      <td class="num ${ky>=3?'red':''}">${ky==null?'':ky}</td>
      <td class="num">${money(r.anlasma_fiyati)}</td>
      <td>${esc(r.uretim_notlari)}</td>
    </tr>`;
  });
  view.innerHTML=`<div class="hint">AÜP — ERP snapshot üstünde canlı görüntü (salt-okur). ${data.length} proje · GYT-AÜP&gt;0 ve Kayma≥3 kırmızı.</div>
    <div class="scroll"><table>
    <thead><tr><th>NO</th><th>PROJE ADI</th><th>DURUM</th><th>Ad</th><th>MVT</th><th>AÜP</th><th>GYT</th><th>GYT-AÜP</th><th>Kayma</th><th>TUTAR €</th><th>Üretim Notu</th></tr></thead>
    <tbody>${rows}</tbody></table></div>`;
}

/* ---------- BOOT ---------- */
(async ()=>{
  const {data}=await sb.auth.getSession();
  if(data.session){ state.session=data.session; renderApp(); }
  else renderLogin('email');
})();
</script>
</body>
</html>
