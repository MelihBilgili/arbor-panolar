catch(e){document.getElementById("load").style.display="none";err.textContent="Parola hatali.";go.disabled=false;try{localStorage.removeItem(LS)}catch(_){}}}
document.getElementById("go").onclick=()=>attempt(document.getElementById("pw").value,document.getElementById("rm").checked);
document.getElementById("pw").addEventListener("keydown",e=>{if(e.key==="Enter")document.getElementById("go").click();});
(function(){try{const s=localStorage.getItem(LS);if(s){document.getElementById("load").style.display="flex";attempt(s,true);}}catch(e){}})();
/* --- SURUM GOZETIMI (Kural 51.2 / O-54, 2026-07-13) ---
   Panolar sekmesi iki PC'de surekli acik duruyor (Kural 51.1). Sayfa statik oldugu icin
   deploy edilen yeni surum ASLA kendiliginden gorunmuyordu -> "pano guncellenmedi" arizasi.
   Cozum: yayindaki .panolar_src_hash 2 dakikada bir no-store ile yoklanir; degisince
   sayfa kendini yeniler (parola localStorage'da oldugu icin yenileme sessiz olur). */
(function(){var BOOT=null,BUSY=false;
async function peek(){if(BUSY)return;BUSY=true;
 try{var r=await fetch(".panolar_src_hash?ts="+Date.now(),{cache:"no-store"});
  if(r.ok){var h=(await r.text()).trim();
   if(!BOOT){BOOT=h;}
   else if(h&&h!==BOOT){location.reload();}}}catch(e){}
 BUSY=false;}
peek();setInterval(peek,120000);
document.addEventListener("visibilitychange",function(){if(!document.hidden)peek();});
})();
</script></body></html>
