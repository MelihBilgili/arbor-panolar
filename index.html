async function decrypt(pw){const enc=new TextEncoder();const km=await crypto.subtle.importKey("raw",enc.encode(pw),"PBKDF2",false,["deriveKey"]);
const key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:dec(P.salt),iterations:P.iter,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["decrypt"]);
const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:dec(P.iv)},key,dec(P.ct));return new TextDecoder().decode(pt);}
function show(h){document.getElementById("gate").style.display="none";const f=document.getElementById("frame");f.srcdoc=h;f.style.display="block";document.getElementById("load").style.display="none";}
async function attempt(pw,remember){const err=document.getElementById("err");err.textContent="";const go=document.getElementById("go");go.disabled=true;document.getElementById("load").style.display="flex";
try{const h=await decrypt(pw);if(remember){try{localStorage.setItem(LS,pw)}catch(e){}}show(h);}
catch(e){document.getElementById("load").style.display="none";err.textContent="Parola hatali.";go.disabled=false;try{localStorage.removeItem(LS)}catch(_){}}}
document.getElementById("go").onclick=()=>attempt(document.getElementById("pw").value,document.getElementById("rm").checked);
document.getElementById("pw").addEventListener("keydown",e=>{if(e.key==="Enter")document.getElementById("go").click();});
(function(){try{const s=localStorage.getItem(LS);if(s){document.getElementById("load").style.display="flex";attempt(s,true);}}catch(e){}})();
